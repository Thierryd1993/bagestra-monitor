name: BAGESTRA Wohnungsmonitor

on:
  schedule:
    # Alle 5 Minuten (GitHub garantiert nicht exakt, aber ±1-2 Min.)
    - cron: "*/5 * * * *"

  # Manuell auslösbar (zum Testen)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: BAGESTRA-Seite prüfen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Zustand speichern (commit state.json)
        run: |
          git config user.name "BAGESTRA Bot"
          git config user.email "bot@bagestra-monitor.local"
          git add state.json
          git diff --staged --quiet || git commit -m "🏠 State update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
